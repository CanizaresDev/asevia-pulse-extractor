name: Daily extract to Google Sheets

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily (08:00 Spain time)
    - cron: "0 13 * * *"  # 13:00 UTC daily (15:00 Spain time)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run extractor
        env:
          # Google Sheets
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSHEETS_SPREADSHEET_ID: ${{ secrets.GSHEETS_SPREADSHEET_ID }}
          GSHEETS_SHEET_NAME: ${{ secrets.GSHEETS_SHEET_NAME }}

          # DigitalOcean Spaces
          SPACES_ENDPOINT: ${{ secrets.SPACES_ENDPOINT }}
          SPACES_REGION: ${{ secrets.SPACES_REGION }}
          SPACES_BUCKET: ${{ secrets.SPACES_BUCKET }}
          SPACES_KEY: ${{ secrets.SPACES_KEY }}
          SPACES_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          SPACES_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          python scripts/extract_counter_to_sheets.py
